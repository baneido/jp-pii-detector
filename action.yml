name: jp-pii-detect
description: 日本特化の個人情報（PII）静的検出器をリポジトリに対して実行する
branding:
  icon: shield
  color: red
inputs:
  args:
    description: jp-pii-detect に渡す引数
    required: false
    default: scan --format github .
  version:
    description: インストールするバージョン（GitHub Releases のタグ、または latest）。再現性が必要な場合は明示指定を推奨
    required: false
    default: latest
runs:
  using: composite
  steps:
    - id: install
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        echo "jp-pii-detect version: $INPUT_VERSION"
        install_dir="${RUNNER_TEMP}/jp-pii-detect/bin"
        "$GITHUB_ACTION_PATH/scripts/install.sh" \
          --version "$INPUT_VERSION" \
          --install-dir "$install_dir"
      shell: bash
    - env:
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        python3 - <<'PY'
        import os
        import shlex
        import subprocess

        scanner = os.path.join(os.environ["RUNNER_TEMP"], "jp-pii-detect", "bin", "jp-pii-detect")
        if os.name == "nt":
            scanner += ".exe"

        args = shlex.split(os.environ["INPUT_ARGS"])
        completed = subprocess.run([scanner, *args], check=False)
        raise SystemExit(completed.returncode)
        PY
      shell: bash
