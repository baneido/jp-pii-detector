name: jp-pii-detect
description: 日本特化の個人情報（PII）静的検出器をリポジトリに対して実行する
branding:
  icon: shield
  color: red
inputs:
  args:
    description: jp-pii-detect に渡す引数
    required: false
    default: scan --format github .
  version:
    description: インストールするバージョン。省略時は Action の完全な semver タグ、それ以外の参照では latest
    required: false
    default: ""
runs:
  using: composite
  steps:
    - id: install
      env:
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        version="$INPUT_VERSION"
        if [ -z "$version" ]; then
          if [[ "$ACTION_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="$ACTION_REF"
          else
            version=latest
          fi
        fi
        echo "jp-pii-detect version: $version"
        install_dir="${RUNNER_TEMP}/jp-pii-detect/bin"
        "$GITHUB_ACTION_PATH/scripts/install.sh" \
          --version "$version" \
          --install-dir "$install_dir"
      shell: bash
    - env:
        INPUT_ARGS: ${{ inputs.args }}
      run: |
        python3 - <<'PY'
        import os
        import shlex
        import subprocess

        scanner = os.path.join(os.environ["RUNNER_TEMP"], "jp-pii-detect", "bin", "jp-pii-detect")
        if os.name == "nt":
            scanner += ".exe"

        args = shlex.split(os.environ["INPUT_ARGS"])
        completed = subprocess.run([scanner, *args], check=False)
        raise SystemExit(completed.returncode)
        PY
      shell: bash
