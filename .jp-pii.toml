# jp-pii-detector 自身の設定（dogfooding）。
# 検出サンプルを含むファイルを走査から除外する。
min_confidence = "medium"

[allowlist]
paths = [
  "^testdata/",
  "^docs/",
  "^README\\.md$",
  # 公開済みの標準テスト番号・ルール境界サンプルを持つ限定ファイル。
  "^internal/checksum/checksum_test\\.go$",
  "^internal/dict/phone_test\\.go$",
  "^internal/rule/builtin_test\\.go$",
  "^internal/detect/(detect|probe_regression|csv_context)_test\\.go$",
  "^internal/fixturegen/.*_test\\.go$",
  "^cmd/jp-pii-detect/main_test\\.go$",
  "^internal/config/config_test\\.go$",
  "^internal/detect/path_profile_test\\.go$",
  "^internal/dict/(municipalities|postal)_test\\.go$",
  "^internal/eval/.*_test\\.go$",
  "^internal/normalize/normalize_test\\.go$",
  "^internal/report/report_test\\.go$",
  "^internal/rule/structured_test\\.go$",
  "^internal/source/gitdiff_test\\.go$",
  # 外部フィクスチャのローカルコピー（実在しうる PII を含む。.gitignore 済みで未コミット）
  "^pii-fixtures\\.json$",
  # Presidio 連携アダプタのサンプル/デモ（架空の PII を含む）
  "^integrations/",
]
