name: ci
on:
  push:
    branches: [main]
  pull_request:
  # main上のworkflowから、レビュー済みcommitを保守者が明示評価できる。
  workflow_dispatch:
    inputs:
      eval_ref:
        description: '評価するレビュー済みcommit SHA（40桁）'
        required: true
        type: string

# 同一ブランチ/PR の古い進行中ランを新しいランで置き換え、無駄な実行を避ける
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# workflow 全体では読み取りのみ。OIDC は必要な job だけに付与する。
permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          # zizmor-action v0.5.7 maps 1.25.2 to a pinned GHCR image digest.
          version: 1.25.2
          inputs: .
          online-audits: false
          advanced-security: false
          annotations: true

  docker:
    name: docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # release ワークフローが公開するコンテナイメージのビルドが壊れていないことを検証する。
      # CI ではホストアーキテクチャのみビルドする（マルチアーキテクチャは release 側）。
      - name: Build image
        run: docker build -t jp-pii-detect:ci .
      - name: Smoke test
        run: |
          set -eu
          docker run --rm jp-pii-detect:ci version
          # dogfooding: コンテナ経由でも自リポジトリのスキャンが偽陽性ゼロで通ること
          docker run --rm -v "$GITHUB_WORKSPACE:/scan" jp-pii-detect:ci scan --format github /scan

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # 認証情報を作業ツリーに残さない（以降の手順は読み取りのみ）
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      # 公開テストレーンは認証・非公開コーパスに依存せず、fork PR でも同じ範囲を実行する。
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./cmd/jp-pii-detect
      - run: ./jp-pii-detect scan --format github .

  private-eval:
    name: private-eval
    # 非公開平文をPRコードへ自動配布しない。mainへのpush、または保守者の明示実行だけで評価する。
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate explicitly selected commit
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          EVAL_REF: ${{ inputs.eval_ref }}
        run: |
          if ! [[ "$EVAL_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "::error::eval_refには40桁のcommit SHAを指定してください。"
            exit 1
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.eval_ref || github.sha }}
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
      - name: Authenticate to Google Cloud (OIDC / Workload Identity)
        if: ${{ vars.JP_PII_FIXTURES_PROVIDER != '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.JP_PII_FIXTURES_PROVIDER }}
          service_account: ${{ vars.JP_PII_FIXTURES_SA }}
      - name: Set up gcloud
        if: ${{ vars.JP_PII_FIXTURES_PROVIDER != '' }}
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - name: Download PII fixtures from GCS
        if: ${{ vars.JP_PII_FIXTURES_PROVIDER != '' }}
        env:
          FIXTURES_BUCKET: ${{ vars.JP_PII_FIXTURES_BUCKET }}
          FIXTURES_GENERATION: ${{ vars.JP_PII_FIXTURES_GENERATION }}
        run: |
          set -eu
          dest="$RUNNER_TEMP/pii-fixtures.json"
          object=$(jq -r '.object' fixtures.lock.json)
          lock_generation=$(jq -r '.generation' fixtures.lock.json)
          source="gs://$FIXTURES_BUCKET/$object"
          if [ -z "${FIXTURES_GENERATION:-}" ]; then
            FIXTURES_GENERATION="$lock_generation"
          fi
          if [ -n "${FIXTURES_GENERATION:-}" ]; then
            source="${source}#${FIXTURES_GENERATION}"
          fi
          gcloud storage cp "$source" "$dest"
          chmod 600 "$dest"
          echo "JP_PII_FIXTURES=$dest" >> "$GITHUB_ENV"
      - name: Remove Google Cloud credentials file
        if: ${{ always() && vars.JP_PII_FIXTURES_PROVIDER != '' }}
        run: rm -f "${GOOGLE_GHA_CREDS_PATH:-}"

      - name: Require and validate private corpus
        run: |
          test -f "$JP_PII_FIXTURES" || {
            echo "::error::非公開評価コーパスを取得できませんでした。"
            exit 1
          }
          go test ./internal/privatecorpus ./internal/eval
      - run: |
          go test ./internal/eval -run 'TestGenerateDoc|TestReadmeBadges' -update
          git diff --exit-code docs/accuracy.md docs/accuracy.json README.md
      - name: Remove private corpus
        if: ${{ always() }}
        run: rm -f "${JP_PII_FIXTURES:-}"
