name: postal-update

on:
  schedule:
    # 毎月 1 日 00:00 UTC（= 09:00 JST、いずれも 1 日）に実行する。
    # 日本郵便は月次でデータを更新するため、月初に最新を取り込む。
    - cron: '0 0 1 * *'
  # 手動実行も許可する（初回投入や臨時更新用）。
  workflow_dispatch: {}

# 多重実行を避ける（コミット/PR 作成の競合防止）。進行中のランは中断しない。
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# 既定では権限を与えず、必要なジョブにのみ最小権限を付与する。
permissions: {}

env:
  # 日本郵便「住所の郵便番号（1 レコード 1 行、UTF-8）」全国一括 zip。
  # 配布ページ: https://www.post.japanpost.jp/zipcode/dl/utf-zip.html
  POSTAL_URL: https://www.post.japanpost.jp/zipcode/dl/utf/zip/utf_ken_all.zip
  # 日本郵便「事業所の個別郵便番号」zip（Shift_JIS 配布）。
  # 配布ページ: https://www.post.japanpost.jp/zipcode/dl/jigyosyo/index-zip.html
  POSTAL_JIGYOSYO_URL: https://www.post.japanpost.jp/zipcode/dl/jigyosyo/zip/jigyosyo.zip
  # PR を載せる作業ブランチ（毎回 force-push して 1 本に集約する）。
  POSTAL_BRANCH: automated/postal-codes

jobs:
  update:
    name: update postal bitset
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # 作業ブランチの push に必要
      pull-requests: write # PR の作成・更新に必要
      id-token: write # GCP Workload Identity Federation（OIDC）に必要（フィクスチャ取得）
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # 認証情報を作業ツリーに残さない。push は GITHUB_TOKEN を URL に埋めて行う。
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          # 生成物の再現性のためキャッシュは使わない
          cache: false

      # 実在しうる PII を含む評価フィクスチャを GCS から取得する（精度ゲート用）。
      # リポジトリ変数が未設定なら取得せず、eval は t.Skip される（後方互換）。
      # schedule / workflow_dispatch は信頼できる実行なので TRUSTED 判定は不要。
      - name: Authenticate to Google Cloud (OIDC / Workload Identity)
        if: ${{ vars.JP_PII_FIXTURES_PROVIDER != '' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.JP_PII_FIXTURES_PROVIDER }}
          service_account: ${{ vars.JP_PII_FIXTURES_SA }}
      - name: Set up gcloud
        if: ${{ vars.JP_PII_FIXTURES_PROVIDER != '' }}
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - name: Download PII fixtures from GCS
        if: ${{ vars.JP_PII_FIXTURES_PROVIDER != '' }}
        # バケット名は env 経由で渡す（run 内に ${{ }} を直接埋めると注入リスク警告になるため）。
        env:
          FIXTURES_BUCKET: ${{ vars.JP_PII_FIXTURES_BUCKET }}
        run: |
          set -eu
          # 後続ステップへ JP_PII_FIXTURES を渡す（runner コンテキストは env: で使えないため
          # $RUNNER_TEMP を使い、GITHUB_ENV 経由で伝播する）。未取得時は未設定のままで eval は Skip。
          dest="$RUNNER_TEMP/pii-fixtures.json"
          gcloud storage cp "gs://$FIXTURES_BUCKET/pii-fixtures.json" "$dest"
          echo "JP_PII_FIXTURES=$dest" >> "$GITHUB_ENV"

      - name: Download Japan Post KEN_ALL (UTF-8)
        run: |
          set -eu
          # -f: HTTP エラー（404 等）で失敗させる。--retry: 一時的な失敗を再試行。
          curl -fsSL --retry 3 --retry-delay 5 -o utf_ken_all.zip "$POSTAL_URL"
          # 取得物が壊れていない zip であることを検証する。
          unzip -tq utf_ken_all.zip

      - name: Download Japan Post jigyosyo (事業所の個別郵便番号)
        run: |
          set -eu
          curl -fsSL --retry 3 --retry-delay 5 -o jigyosyo.zip "$POSTAL_JIGYOSYO_URL"
          unzip -tq jigyosyo.zip

      - name: Regenerate postal bitset
        run: |
          set -eu
          # gen は生成件数（ken_all + jigyosyo の合算・重複排除後）を
          # "postal codes: N" として標準出力に出す。
          out=$(go run ./internal/dict/gen \
            -ken-all-input utf_ken_all.zip \
            -jigyosyo-input jigyosyo.zip \
            -output internal/dict/postal_codes.bitset)
          echo "$out"
          count=$(printf '%s\n' "$out" | sed -n 's/^postal codes: //p')

          # サニティチェック 1: ビットセットは 10,000,000 ビット = 1,250,000 バイト固定。
          size=$(wc -c < internal/dict/postal_codes.bitset)
          if [ "$size" -ne 1250000 ]; then
            echo "::error::postal_codes.bitset のサイズが不正: ${size} バイト（期待 1250000）"
            exit 1
          fi
          # サニティチェック 2: 取り込んだ郵便番号件数。切り詰められた CSV を弾く
          # （ken_all だけで 12 万件規模、jigyosyo が概算 2 万件規模あるため、
          # 合算 14 万件未満は異常とみなす）。
          if [ -z "${count:-}" ] || [ "$count" -lt 140000 ]; then
            echo "::error::郵便番号の件数が少なすぎる: '${count:-unknown}'（ダウンロード破損の可能性）"
            exit 1
          fi

      - name: Verify build, embed, and dogfooding
        run: |
          set -eu
          go vet ./...
          # フィクスチャがあれば精度ゲート（TestAccuracy）も走る。なければ Skip。
          go test ./...
          go build ./cmd/jp-pii-detect
          # 生の zip は走査対象に含めないよう削除する（.gitignore 済みだが念のため）。
          rm -f utf_ken_all.zip jigyosyo.zip
          ./jp-pii-detect scan --format github .

      # フィクスチャが取れていれば、バッジ・docs/accuracy.md・docs/accuracy.json
      # （ゴールデンファイル）を実測で再生成して PR に含める。実測値が docs/accuracy.json
      # から外れた場合は上の go test（TestAccuracy）が失敗しており、ここには到達しない。
      - name: Regenerate accuracy docs and badges
        if: ${{ vars.JP_PII_FIXTURES_PROVIDER != '' }}
        run: go test ./internal/eval -run 'TestGenerateDoc|TestReadmeBadges' -update

      - name: Open PR if the data changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if git diff --quiet internal/dict/postal_codes.bitset; then
            echo "郵便番号データに変更なし。PR は作成しない。"
            exit 0
          fi

          today=$(date -u +%Y-%m-%d)
          git config user.name "jp-pii-detect-bot"
          git config user.email "contact@baneido.com" # jp-pii-detector:ignore bot の連絡先
          git checkout -b "$POSTAL_BRANCH"
          # ビットセットと、再生成された精度ドキュメント・ゴールデンファイル・バッジ（あれば）を含める。
          git add internal/dict/postal_codes.bitset docs/accuracy.md docs/accuracy.json README.md
          git commit -m "chore(dict): 郵便番号データを更新（${today}）"
          # 同一リポジトリへの push。認証情報は URL に都度埋め、作業ツリーには残さない。
          git push -f \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${POSTAL_BRANCH}"

          # PR 本文は静的なテンプレート（コミット済み）を使う。シェルの引用と無縁で、
          # Markdown のコードスパンもそのまま表示される。
          if gh pr view "$POSTAL_BRANCH" >/dev/null 2>&1; then
            echo "既存 PR を更新した（${POSTAL_BRANCH}）。"
          else
            gh pr create --base main --head "$POSTAL_BRANCH" \
              --title "chore(dict): 郵便番号データ更新（${today}）" \
              --body-file .github/postal-pr-body.md
          fi
