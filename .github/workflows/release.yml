name: release
on:
  push:
    tags:
      - 'v*'

# 進行中のリリースを中断しないため cancel-in-progress は無効にする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# 既定では権限を与えず、必要なジョブにのみ最小権限を付与する
permissions: {}

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release の作成とアセットのアップロードに必要
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # 認証情報を作業ツリーに残さない（gh は GH_TOKEN を使うため不要）
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          # リリースの再現性確保とキャッシュポイズニング防止のためキャッシュを無効化
          cache: false
      - name: Test tagged commit
        run: go test ./...
      - name: Build release assets
        run: |
          set -eu
          mkdir -p dist
          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64 \
            windows/arm64
          do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            asset="jp-pii-detect_${GOOS}_${GOARCH}"
            out_dir="dist/${asset}"
            bin_name="jp-pii-detect"
            if [ "$GOOS" = "windows" ]; then
              bin_name="jp-pii-detect.exe"
            fi

            mkdir -p "$out_dir"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "${out_dir}/${bin_name}" \
              ./cmd/jp-pii-detect
            tar -czf "dist/${asset}.tar.gz" -C "$out_dir" "$bin_name"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

  docker:
    name: docker
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # Dockerfile とソースの取得のみ
      packages: write # GHCR へのイメージ push に必要
    env:
      IMAGE: ghcr.io/baneido/jp-pii-detector
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # push には github.token を docker login で使うため checkout の認証情報は残さない
          persist-credentials: false
      - name: Log in to GitHub Container Registry
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
      # 実行イメージ側の RUN 命令（apk add）を arm64 でも実行できるよう QEMU を登録する。
      # サプライチェーン対策としてイメージは digest でピン留めする。
      - name: Register QEMU for arm64
        run: docker run --privileged --rm tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0 --install arm64
      - name: Build and push multi-arch image
        run: |
          set -eu
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "VERSION=${TAG}" \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            --push \
            .

  homebrew:
    name: homebrew
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # 自リポジトリのテンプレート取得のみ。tap への push は TAP_TOKEN を使う
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # tap の push には TAP_TOKEN を使うため checkout の認証情報は残さない
          persist-credentials: false
      - name: Open Homebrew formula PR on baneido/homebrew-tap
        env:
          # baneido/homebrew-tap への push / PR 作成権限を持つトークン（shipsafe と共用）。
          # 未設定ならスキップする。
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_GITHUB_TOKEN not set — skipping Homebrew formula update"
            exit 0
          fi
          version="${TAG#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          curl -fsSL "${base}/checksums.txt" -o checksums.txt
          sha() {
            value=$(awk -v asset="$1" '$2 == asset {print $1}' checksums.txt)
            [ -n "$value" ] || { echo "checksums.txt missing $1" >&2; exit 1; }
            printf '%s' "$value"
          }
          darwin_arm64=$(sha jp-pii-detect_darwin_arm64.tar.gz)
          darwin_amd64=$(sha jp-pii-detect_darwin_amd64.tar.gz)
          linux_arm64=$(sha jp-pii-detect_linux_arm64.tar.gz)
          linux_amd64=$(sha jp-pii-detect_linux_amd64.tar.gz)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/baneido/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed -e "s|{{VERSION}}|${version}|g" \
              -e "s|{{TAG}}|${TAG}|g" \
              -e "s|{{SHA256_DARWIN_ARM64}}|${darwin_arm64}|g" \
              -e "s|{{SHA256_DARWIN_AMD64}}|${darwin_amd64}|g" \
              -e "s|{{SHA256_LINUX_ARM64}}|${linux_arm64}|g" \
              -e "s|{{SHA256_LINUX_AMD64}}|${linux_amd64}|g" \
              scripts/jp-pii-detect.rb.tmpl > tap/Formula/jp-pii-detect.rb
          cd tap
          # tap の main は protect-main ルールでレビュー必須のため、直接 push せず PR を作る
          if [ -z "$(git status --porcelain Formula/jp-pii-detect.rb)" ]; then
            echo "formula already up to date for ${version}; nothing to do"
            exit 0
          fi
          branch="jp-pii-detect-${version}"
          git config user.name "jp-pii-detect-release-bot"
          git config user.email "contact@baneido.com" # jp-pii-detector:ignore リリース bot の連絡先
          git checkout -b "$branch"
          git add Formula/jp-pii-detect.rb
          git commit -m "jp-pii-detect ${version}"
          git push -f origin "$branch"
          export GH_TOKEN="$TAP_TOKEN"
          if gh pr view "$branch" --repo baneido/homebrew-tap >/dev/null 2>&1; then
            echo "PR for ${branch} already exists; branch updated"
          else
            gh pr create --repo baneido/homebrew-tap --base main --head "$branch" \
              --title "jp-pii-detect ${version}" \
              --body "jp-pii-detect ${version} の formula 自動更新です。リリース: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          fi
