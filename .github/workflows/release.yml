name: release
on:
  push:
    tags:
      - 'v*'

# 進行中のリリースを中断しないため cancel-in-progress は無効にする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# 既定では権限を与えず、必要なジョブにのみ最小権限を付与する
permissions: {}

jobs:
  release:
    name: release
    # ムービングメジャータグ（v0 など、ドットを含まない）が push されたときは
    # 本ジョブと後続ジョブ（needs: release）をまるごとスキップし、v0 の付け替えによる
    # ワークフローの再帰起動を防ぐ。実リリースタグ（v0.3.6 など）のみを処理する。
    if: ${{ contains(github.ref_name, '.') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release の作成とアセットのアップロード、v0 タグの付け替えに必要
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # 認証情報を作業ツリーに残さない（gh は GH_TOKEN を使うため不要）
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          # リリースの再現性確保とキャッシュポイズニング防止のためキャッシュを無効化
          cache: false
      - name: Test tagged commit
        run: go test ./...
      - name: Build release assets
        run: |
          set -eu
          mkdir -p dist
          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64 \
            windows/arm64
          do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            asset="jp-pii-detect_${GOOS}_${GOARCH}"
            out_dir="dist/${asset}"
            bin_name="jp-pii-detect"
            if [ "$GOOS" = "windows" ]; then
              bin_name="jp-pii-detect.exe"
            fi

            mkdir -p "$out_dir"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "${out_dir}/${bin_name}" \
              ./cmd/jp-pii-detect
            tar -czf "dist/${asset}.tar.gz" -C "$out_dir" "$bin_name"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
      - name: Move major version tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          # メジャータグ（例: v0.3.6 -> v0）を今回のリリースタグへ強制的に付け替え、
          # 利用者が @v0 で最新の同一メジャー系を追従できるようにする。
          # checkout は persist-credentials: false のため、push は認証付き URL で行う。
          major="${TAG%%.*}"
          git tag -f "$major" "$TAG"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${major}"

  docker:
    name: docker
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # Dockerfile とソースの取得のみ
      packages: write # GHCR へのイメージ push に必要
    env:
      IMAGE: ghcr.io/baneido/jp-pii-detector
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # push には github.token を docker login で使うため checkout の認証情報は残さない
          persist-credentials: false
      - name: Log in to GitHub Container Registry
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
      # 実行イメージ側の RUN 命令（apk add）を arm64 でも実行できるよう QEMU を登録する。
      # サプライチェーン対策としてイメージは digest でピン留めする。
      - name: Register QEMU for arm64
        run: docker run --privileged --rm tonistiigi/binfmt:qemu-v10.2.3@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0 --install arm64
      - name: Build and push multi-arch image
        run: |
          set -eu
          docker buildx create --use
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg "VERSION=${TAG}" \
            --tag "${IMAGE}:${TAG}" \
            --tag "${IMAGE}:latest" \
            --push \
            .

  homebrew:
    name: homebrew
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read # 自リポジトリのテンプレート取得のみ。tap への push は TAP_TOKEN を使う
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # tap の push には TAP_TOKEN を使うため checkout の認証情報は残さない
          persist-credentials: false
      - name: Open Homebrew formula PR on baneido/homebrew-tap
        env:
          # baneido/homebrew-tap への push / PR 作成権限を持つトークン（shipsafe と共用）。
          # 未設定ならスキップする。
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::warning::TAP_GITHUB_TOKEN not set — skipping Homebrew formula update"
            exit 0
          fi
          version="${TAG#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          curl -fsSL "${base}/checksums.txt" -o checksums.txt
          sha() {
            value=$(awk -v asset="$1" '$2 == asset {print $1}' checksums.txt)
            [ -n "$value" ] || { echo "checksums.txt missing $1" >&2; exit 1; }
            printf '%s' "$value"
          }
          darwin_arm64=$(sha jp-pii-detect_darwin_arm64.tar.gz)
          darwin_amd64=$(sha jp-pii-detect_darwin_amd64.tar.gz)
          linux_arm64=$(sha jp-pii-detect_linux_arm64.tar.gz)
          linux_amd64=$(sha jp-pii-detect_linux_amd64.tar.gz)

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/baneido/homebrew-tap.git" tap
          mkdir -p tap/Formula
          sed -e "s|{{VERSION}}|${version}|g" \
              -e "s|{{TAG}}|${TAG}|g" \
              -e "s|{{SHA256_DARWIN_ARM64}}|${darwin_arm64}|g" \
              -e "s|{{SHA256_DARWIN_AMD64}}|${darwin_amd64}|g" \
              -e "s|{{SHA256_LINUX_ARM64}}|${linux_arm64}|g" \
              -e "s|{{SHA256_LINUX_AMD64}}|${linux_amd64}|g" \
              scripts/jp-pii-detect.rb.tmpl > tap/Formula/jp-pii-detect.rb
          cd tap
          # tap の main は protect-main ルールでレビュー必須のため、直接 push せず PR を作る
          if [ -z "$(git status --porcelain Formula/jp-pii-detect.rb)" ]; then
            echo "formula already up to date for ${version}; nothing to do"
            exit 0
          fi
          branch="jp-pii-detect-${version}"
          git config user.name "jp-pii-detect-release-bot"
          git config user.email "contact@baneido.com" # jp-pii-detector:ignore リリース bot の連絡先
          git checkout -b "$branch"
          git add Formula/jp-pii-detect.rb
          git commit -m "jp-pii-detect ${version}"
          git push -f origin "$branch"
          export GH_TOKEN="$TAP_TOKEN"
          if gh pr view "$branch" --repo baneido/homebrew-tap >/dev/null 2>&1; then
            echo "PR for ${branch} already exists; branch updated"
          else
            gh pr create --repo baneido/homebrew-tap --base main --head "$branch" \
              --title "jp-pii-detect ${version}" \
              --body "jp-pii-detect ${version} の formula 自動更新です。リリース: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          fi

  docs:
    name: docs
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # docs 更新ブランチの push に必要
      pull-requests: write # docs バージョン更新 PR の作成に必要
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # push / PR 作成には github.token を使うため checkout の認証情報は残さない
          persist-credentials: false
      - name: Open docs version bump PR
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          # README / docs 内のバージョン表記（vX.Y.Z）と distribution_test.go の
          # docsVersion 定数を新しいリリースタグへ一括更新する。バージョン表記の
          # 陳腐化を防ぐ自動 PR（Homebrew formula 更新ジョブと同型）。
          #
          # comparison.md は gitleaks の rev（v8.18.4 等）のようなサードパーティ版数を
          # 含むため無差別 sed は使えない。scripts/distribution_test.go の一貫性検査
          # （TestDocsVersionReferencesMatchDocsVersion）と同じ「自プロジェクトを指す
          # マーカーが同一行または直前 2 行以内にある行だけを置換する」方式を python3 で
          # 実装する。下記 MARKERS は distribution_test.go の markers と同期している必要が
          # あり、片方だけ変更すると置換対象と CI 検査対象が食い違うので必ず一緒に更新すること。
          python3 - "$TAG" README.md README.en.md docs/integrations.md docs/comparison.md <<'PY'
          import re
          import sys

          tag = sys.argv[1]
          files = sys.argv[2:]
          # distribution_test.go の markers と同期させること。
          MARKERS = (
              "jp-pii-detector",
              "jp-pii-detect",
              "JP_PII_DETECT_VERSION",
              "ghcr.io/baneido",
          )
          ver_re = re.compile(r"\bv\d+\.\d+\.\d+\b")

          def has_marker(line):
              return any(m in line for m in MARKERS)

          for path in files:
              try:
                  with open(path, encoding="utf-8") as fh:
                      lines = fh.read().split("\n")
              except FileNotFoundError:
                  continue
              changed = False
              for i, line in enumerate(lines):
                  # 同一行または直前 2 行以内にマーカーがある行だけを対象にする。
                  in_scope = any(has_marker(lines[j]) for j in range(max(0, i - 2), i + 1))
                  if not in_scope:
                      continue
                  new_line = ver_re.sub(tag, line)
                  if new_line != line:
                      lines[i] = new_line
                      changed = True
              if changed:
                  with open(path, "w", encoding="utf-8") as fh:
                      fh.write("\n".join(lines))
          PY
          sed -i -E "s/(docsVersion = \")v[0-9]+\.[0-9]+\.[0-9]+(\")/\1${TAG}\2/" scripts/distribution_test.go
          if [ -z "$(git status --porcelain)" ]; then
            echo "docs already up to date for ${TAG}; nothing to do"
            exit 0
          fi
          branch="docs-version-${TAG}"
          git config user.name "jp-pii-detect-release-bot"
          git config user.email "contact@baneido.com" # jp-pii-detector:ignore リリース bot の連絡先
          git checkout -b "$branch"
          git commit -am "docs: バージョン表記を ${TAG} に更新"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$branch"
          if gh pr view "$branch" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "PR for ${branch} already exists; branch updated"
          else
            gh pr create --repo "${GITHUB_REPOSITORY}" --base main --head "$branch" \
              --title "docs: バージョン表記を ${TAG} に更新" \
              --body "リリース ${TAG} に合わせて README / docs のバージョン表記と docsVersion 定数を自動更新しました。リリース: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          fi
