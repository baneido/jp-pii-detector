name: release
on:
  push:
    tags:
      - 'v*'

# 進行中のリリースを中断しないため cancel-in-progress は無効にする
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# 既定では権限を与えず、必要なジョブにのみ最小権限を付与する
permissions: {}

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # GitHub Release の作成とアセットのアップロードに必要
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # 認証情報を作業ツリーに残さない（gh は GH_TOKEN を使うため不要）
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          # リリースの再現性確保とキャッシュポイズニング防止のためキャッシュを無効化
          cache: false
      - name: Test tagged commit
        run: go test ./...
      - name: Build release assets
        run: |
          set -eu
          mkdir -p dist
          for target in \
            linux/amd64 \
            linux/arm64 \
            darwin/amd64 \
            darwin/arm64 \
            windows/amd64 \
            windows/arm64
          do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            asset="jp-pii-detect_${GOOS}_${GOARCH}"
            out_dir="dist/${asset}"
            bin_name="jp-pii-detect"
            if [ "$GOOS" = "windows" ]; then
              bin_name="jp-pii-detect.exe"
            fi

            mkdir -p "$out_dir"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "${out_dir}/${bin_name}" \
              ./cmd/jp-pii-detect
            tar -czf "dist/${asset}.tar.gz" -C "$out_dir" "$bin_name"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tar.gz dist/checksums.txt \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
