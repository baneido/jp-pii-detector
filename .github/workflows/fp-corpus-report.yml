name: fp-corpus-report

# 大規模公開 OSS コーパスに対する jp-pii-detect の偽陽性率（findings/MLoC）を計測する。
#
# 背景（#71）: 実運用の偽陽性率を測る仕組みが自リポジトリの dogfooding（ci.yml、既定で
# 0 件期待）しか存在しない。小さな自リポジトリ 1 つでは陰性母数が不足し、
# NegativeContext・allowlist などの偽陽性削減施策の効果を測る場がない。そこで、第三者に
# 長期間・大規模に精査されている著名 OSS（標準ライブラリ・ビルドツール等）をコーパスとして
# 定期スキャンし、findings/MLoC をトレンド指標として記録する（現時点では CI ゲートにはしない）。
#
# ci.yml の test job（精度ゴールデン・README バッジ・ドッグフードのゲート）とは完全に独立しており、
# このワークフローの成否は PR CI に一切影響しない（postal-update.yml と同様の分離方針）。
#
# 固定コーパスの取得・スキャンを確認したため週次実行する。手動実行は既定ブランチに限定し、
# PR のコードに OIDC 権限を渡さない（docs/development.md「OSS コーパスでの偽陽性率計測」参照）。
on:
  schedule:
    - cron: '0 3 * * 1' # 毎週月曜 03:00 UTC（= 12:00 JST）
  workflow_dispatch: {}

# 多重実行を避ける（クローン帯域・GCS 書き込みの競合防止）。進行中のランは中断しない。
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# 既定では権限を与えず、必要な job にのみ最小権限を付与する。
permissions: {}

jobs:
  fp-corpus-report:
    name: fp corpus report
    # workflow_dispatch で任意ブランチの workflow を OIDC 付きで動かせないようにする。
    if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    # コーパスのクローン + スキャンは自リポジトリの CI より時間がかかるため長めに確保する。
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write # GCP Workload Identity Federation（OIDC）に必要（結果保存用。任意）
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build jp-pii-detect
        run: go build -o "$RUNNER_TEMP/jp-pii-detect" ./cmd/jp-pii-detect

      # コーパス一覧を取得・スキャンし、コーパスごとの集計（rule_id と件数のみ。生値・
      # マスク値ともに含めない）を $RUNNER_TEMP/reports/ に書き出す。
      #
      # 選定基準（#71 対応方針 (2)）: 大規模かつ長期間・広く第三者に精査されている著名 OSS
      # （標準ライブラリ・ビルドツール等）のみを対象にする。自治体オープンデータ処理系のような
      # 実 PII を扱う蓋然性が高いカテゴリは対象外。日本語コメントを含む対象を追加する場合は、
      # 個人ブログ的なサンプルデータを含まない企業メンテの本体コードに限定すること。
      #
      # 新規コーパスを追加・更新する際は、対応するコミット（タグ相当）を固定した上で、
      # 追加前に一度ローカルで `jp-pii-detect scan --format text --unmask` を実行し、
      # 報告された findings（多くは JAN コード・型番・テスト用カード番号等の偽陽性のはず）
      # を目視で確認し、実在しうる PII が含まれていないことを確認してから登録する
      # （運用手順は docs/development.md 参照）。
      #
      # 行はコミットを固定するために `git fetch --depth 1 origin <commit-sha>` で 1
      # コミットだけ取得する（浅いクローンで帯域を抑えつつ upstream の変更でトレンドが
      # ノイズ化しないようにする）。
      - name: Scan OSS corpora
        run: |
          set -eu
          reports_dir="$RUNNER_TEMP/reports"
          mkdir -p "$reports_dir"

          # name|git-url|commit-sha  # タグ（参考コメント）
          corpora='
          go|https://github.com/golang/go.git|28622c19591d95c9a83f706f2ed1b303d58da85f
          curl|https://github.com/curl/curl.git|3f00a2f6fa97f7721b65606954aac979dcb6caac
          typescript|https://github.com/microsoft/TypeScript.git|050880ce59e30b356b686bd3144efe24f875ebc8
          '

          echo "$corpora" | while IFS='|' read -r name url sha; do
            [ -z "$name" ] && continue
            echo "::group::${name}"

            dir="$RUNNER_TEMP/corpus-${name}"
            rm -rf "$dir"
            git init -q "$dir"
            git -C "$dir" remote add origin "$url"
            git -C "$dir" fetch --quiet --depth 1 origin "$sha"
            git -C "$dir" checkout -q FETCH_HEAD

            findings_json="$RUNNER_TEMP/${name}.findings.json"
            # --exit-zero: findings があっても以降の集計処理まで到達させる。
            # 既定でマスクされた match 値のみを含む（--unmask は付けない）。
            "$RUNNER_TEMP/jp-pii-detect" scan --format json --exit-zero "$dir" > "$findings_json"

            scripts/fp-corpus-report.sh "$name" "$dir" "$findings_json" > "$reports_dir/${name}.json"

            # 生値・マスク値を含みうる中間物は残さない（集計結果のみ次段へ渡す）。
            rm -rf "$dir" "$findings_json"
            echo "::endgroup::"
          done

          find "$reports_dir" -name '*.json' | sort

      # 複数コーパスの集計を 1 つにまとめる。
      # detail.json: コーパス名付きの内訳（GCS 非公開バケットにのみ保存）。
      # summary.json / summary.md: コーパス名を伏せたルール別合計のみ（ログ・GCS 双方に出す）。
      # 実リポジトリ名と findings 内訳の組を公開の場に出さないための分離
      # （#71 リスク・副作用「responsible disclosure 対策」参照）。
      - name: Merge corpus reports
        run: |
          set -eu
          reports_dir="$RUNNER_TEMP/reports"

          jq -s '.' "$reports_dir"/*.json > "$RUNNER_TEMP/detail.json"

          jq -s '
            (map(.physical_lines) | add) as $lines
            | (map(.mloc) | add) as $mloc
            | (map(.findings_total) | add) as $total
            | {
                generated_at: (now | todate),
                corpora_count: length,
                total_physical_lines: $lines,
                total_mloc: $mloc,
                total_findings: $total,
                findings_per_mloc: (if $mloc > 0 then ($total / $mloc) else null end),
                by_rule: (
                  map(.by_rule[])
                  | group_by(.rule_id)
                  | map({
                      rule_id: .[0].rule_id,
                      count: (map(.count) | add),
                      per_mloc: (if $mloc > 0 then ((map(.count) | add) / $mloc) else null end)
                    })
                  | sort_by(-.count)
                )
              }
          ' "$reports_dir"/*.json > "$RUNNER_TEMP/summary.json"

          {
            echo '# fp-corpus-report'
            echo
            jq -r '
              "- generated_at: " + .generated_at,
              "- corpora_count: " + (.corpora_count | tostring),
              "- total_physical_lines: " + (.total_physical_lines | tostring),
              "- total_mloc: " + (.total_mloc | tostring),
              "- total_findings: " + (.total_findings | tostring),
              "- findings_per_mloc: " + (.findings_per_mloc | tostring),
              "",
              "| rule_id | count | per_mloc |",
              "|---|---|---|",
              (.by_rule[] | "| " + .rule_id + " | " + (.count | tostring) + " | " + (.per_mloc | tostring) + " |")
            ' "$RUNNER_TEMP/summary.json"
          } > "$RUNNER_TEMP/summary.md"

          cat "$RUNNER_TEMP/summary.md" >> "$GITHUB_STEP_SUMMARY"
          echo "--- summary (anonymized) ---"
          cat "$RUNNER_TEMP/summary.json"

      # 3 変数はすべて設定するか、すべて未設定にする。部分設定を黙って bootstrap と
      # 解釈すると履歴欠損を見逃すため、設定不整合はエラーにする。
      - name: Validate report storage configuration
        id: report-storage
        env:
          REPORTS_PROVIDER: ${{ vars.JP_PII_REPORTS_PROVIDER }}
          REPORTS_SA: ${{ vars.JP_PII_REPORTS_SA }}
          REPORTS_BUCKET: ${{ vars.JP_PII_REPORTS_BUCKET }}
        run: |
          set -eu
          configured=0
          [ -n "$REPORTS_PROVIDER" ] && configured=$((configured + 1))
          [ -n "$REPORTS_SA" ] && configured=$((configured + 1))
          [ -n "$REPORTS_BUCKET" ] && configured=$((configured + 1))
          if [ "$configured" -ne 0 ] && [ "$configured" -ne 3 ]; then
            echo "::error::JP_PII_REPORTS_PROVIDER/SA/BUCKET は3つすべて設定してください"
            exit 1
          fi
          if [ "$configured" -eq 3 ]; then
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          else
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
            echo "::notice::report storage 未設定のため、履歴保存と前回比較をスキップします"
          fi

      # 評価コーパスの reader とは別の writer 主体・bucket を使う。
      - name: Authenticate to Google Cloud (OIDC / Workload Identity)
        if: ${{ steps.report-storage.outputs.enabled == 'true' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.JP_PII_REPORTS_PROVIDER }}
          service_account: ${{ vars.JP_PII_REPORTS_SA }}
      - name: Set up gcloud
        if: ${{ steps.report-storage.outputs.enabled == 'true' }}
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - name: Load previous baseline
        if: ${{ steps.report-storage.outputs.enabled == 'true' }}
        id: baseline
        env:
          REPORTS_BUCKET: ${{ vars.JP_PII_REPORTS_BUCKET }}
        run: |
          set -eu
          baseline="gs://$REPORTS_BUCKET/fp-corpus-report/latest-summary.json"
          error_file="$RUNNER_TEMP/baseline-error.txt"
          if generation=$(gcloud storage objects describe "$baseline" --format='value(generation)' 2> "$error_file"); then
            case "$generation" in
              ''|*[!0-9]*) echo "::error::baseline generation が不正です"; exit 1 ;;
            esac
            gcloud storage cp "$baseline" "$RUNNER_TEMP/previous-summary.json"
            echo 'found=true' >> "$GITHUB_OUTPUT"
            echo "generation=$generation" >> "$GITHUB_OUTPUT"
          elif grep -Eqi '(^|[^0-9])404([^0-9]|$)|not[ -]found|No URLs matched' "$error_file"; then
            echo 'found=false' >> "$GITHUB_OUTPUT"
            echo 'generation=0' >> "$GITHUB_OUTPUT"
            echo "::notice::永続baselineがないため、今回の成功結果を初回baselineとして保存します"
          else
            cat "$error_file" >&2
            echo "::error::baseline取得に失敗しました。履歴を上書きせず終了します"
            exit 1
          fi
      - name: Compare with previous baseline (non-gating)
        if: ${{ steps.baseline.outputs.found == 'true' }}
        env:
          TREND_THRESHOLD_PERCENT: '20'
        run: |
          set -eu
          scripts/fp-corpus-trend.sh \
            "$RUNNER_TEMP/summary.json" \
            "$RUNNER_TEMP/previous-summary.json" \
            "$TREND_THRESHOLD_PERCENT" > "$RUNNER_TEMP/trend.json"

          {
            echo
            echo '## 前回比トレンド（非ゲート）'
            jq -r '
              "- warning: " + (.warning | tostring),
              "- threshold_percent: " + (.threshold_percent | tostring),
              "- previous_findings_per_mloc: " + (.previous_findings_per_mloc | tostring),
              "- current_findings_per_mloc: " + (.current_findings_per_mloc | tostring),
              "- overall_change_percent: " + ((.overall_change_percent // "n/a") | tostring),
              "",
              "| rule_id | previous | current | change_percent | warning |",
              "|---|---:|---:|---:|---|",
              (.by_rule[] | "| " + .rule_id + " | " + (.previous_count | tostring) + " | " + (.current_count | tostring) + " | " + ((.change_percent // "n/a") | tostring) + " | " + (.warning | tostring) + " |")
            ' "$RUNNER_TEMP/trend.json"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$(jq -r '.warning' "$RUNNER_TEMP/trend.json")" = true ]; then
            echo "::warning::fp-corpus-report が前回比閾値を超えました（非ゲート）。詳細はstep summaryを確認してください"
          fi
      - name: Upload report snapshot to GCS
        if: ${{ steps.report-storage.outputs.enabled == 'true' }}
        env:
          REPORTS_BUCKET: ${{ vars.JP_PII_REPORTS_BUCKET }}
          BASELINE_GENERATION: ${{ steps.baseline.outputs.generation }}
        run: |
          set -eu
          prefix="gs://$REPORTS_BUCKET/fp-corpus-report"
          run_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          # run_id ごとの履歴は作成時条件で不変にし、再実行・外部 writer との競合で
          # 上書きしない。detail.json（コーパス名付き）は非公開バケットだけに置く。
          gcloud storage cp "$RUNNER_TEMP/detail.json" "$prefix/${run_id}-detail.json" --if-generation-match=0
          gcloud storage cp "$RUNNER_TEMP/summary.json" "$prefix/${run_id}-summary.json" --if-generation-match=0
          gcloud storage cp "$RUNNER_TEMP/summary.md" "$prefix/${run_id}-summary.md" --if-generation-match=0

          # latest は読み込んだ世代に対する compare-and-swap。concurrency に加え、
          # workflow 外の writer と競合した場合も古い結果で上書きしない。
          gcloud storage cp "$RUNNER_TEMP/summary.json" "$prefix/latest-summary.json" \
            --if-generation-match="$BASELINE_GENERATION"
      - name: Remove Google Cloud credentials file
        if: ${{ always() && steps.report-storage.outputs.enabled == 'true' }}
        run: rm -f "${GOOGLE_GHA_CREDS_PATH:-}"
