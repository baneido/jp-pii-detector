# pre-commit フレームワーク (https://pre-commit.com) 用フック定義
- id: jp-pii-detect
  name: jp-pii-detect（日本特化 PII 検出）
  description: ステージ済み変更の追加行から日本の個人情報を検出する
  entry: scripts/pre-commit.sh
  language: script
  pass_filenames: false
- id: jp-pii-detect-full
  name: jp-pii-detect（リポジトリ全体）
  description: リポジトリ全体を走査する（初回導入・手動監査用）
  entry: scripts/pre-commit.sh --full
  language: script
  pass_filenames: false
