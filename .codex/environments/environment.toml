# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "jp-pii-detector"

[setup]
script = ""

[setup.darwin]
script = '''
#!/usr/bin/env sh
set -eu

die() {
	printf '%s\n' "jp-pii-detect setup: $*" >&2
	exit 1
}

info() {
	printf '%s\n' "==> $*"
}

usage() {
	cat <<'USAGE'
Usage: scripts/setup.sh [options]

Sets up a local development checkout for jp-pii-detector.

Options:
  --skip-checks       Do not run go vet and go test
  --skip-build        Do not build ./jp-pii-detect
  --install-git-hook  Install .git/hooks/pre-commit for this checkout
  --with-presidio     Create integrations/presidio/.venv and install Python deps
  -h, --help          Show this help

Environment:
  JP_PII_REPO_ROOT     Repository root override (default: git/PWD detection)
  JP_PII_SETUP_PYTHON  Python executable for --with-presidio (default: python3)
USAGE
}

require_cmd() {
	if ! command -v "$1" >/dev/null 2>&1; then
		die "$1 is required"
	fi
}

resolve_repo_root() {
	for candidate in "${JP_PII_REPO_ROOT:-}" "${PWD:-}" "${OLDPWD:-}" "${GITHUB_WORKSPACE:-}"; do
		[ -n "$candidate" ] || continue
		if command -v git >/dev/null 2>&1; then
			if root=$(git -C "$candidate" rev-parse --show-toplevel 2>/dev/null); then
				printf '%s\n' "$root"
				return
			fi
		fi
		if [ -f "$candidate/go.mod" ]; then
			CDPATH= cd -- "$candidate" && pwd
			return
		fi
	done
	die "could not determine repository root; run from a checkout or set JP_PII_REPO_ROOT"
}

go_mod_version() {
	awk '$1 == "go" { print $2; exit }' "$repo_root/go.mod"
}

go_version() {
	if version=$(go env GOVERSION 2>/dev/null); then
		printf '%s\n' "${version#go}"
		return
	fi
	go version | awk '{ sub(/^go/, "", $3); print $3 }'
}

check_go_version() {
	required=$(go_mod_version)
	current=$(go_version)
	awk -v have="$current" -v want="$required" '
		function normalize(version, out, n, i) {
			sub(/^go/, "", version)
			sub(/[^0-9.].*$/, "", version)
			n = split(version, out, ".")
			for (i = n + 1; i <= 3; i++) {
				out[i] = 0
			}
		}
		BEGIN {
			normalize(have, h)
			normalize(want, w)
			for (i = 1; i <= 3; i++) {
				if (h[i] + 0 > w[i] + 0) {
					exit 0
				}
				if (h[i] + 0 < w[i] + 0) {
					exit 1
				}
			}
			exit 0
		}
	' || die "Go ${required} or newer is required (found ${current})"
}

install_git_hook() {
	require_cmd git
	hook_path=$(git -C "$repo_root" rev-parse --git-path hooks/pre-commit)
	hook_dir=$(dirname -- "$hook_path")
	mkdir -p "$hook_dir"

	if [ -e "$hook_path" ] && ! grep -q 'Generated by scripts/setup.sh for jp-pii-detector' "$hook_path" 2>/dev/null; then
		die "pre-commit hook already exists at ${hook_path}; move it aside or edit it manually"
	fi

	{
		printf '%s\n' '#!/usr/bin/env sh'
		printf '%s\n' '# Generated by scripts/setup.sh for jp-pii-detector.'
		printf '%s\n' 'repo_root=$(git rev-parse --show-toplevel) || exit 1'
		printf '%s\n' 'exec "$repo_root/scripts/pre-commit.sh" "$@"'
	} >"$hook_path"
	chmod 0755 "$hook_path"
	info "Installed git pre-commit hook: ${hook_path}"
}

setup_presidio() {
	python=${JP_PII_SETUP_PYTHON:-python3}
	require_cmd "$python"

	presidio_dir="${repo_root}/integrations/presidio"
	venv="${presidio_dir}/.venv"
	info "Creating Presidio virtualenv: ${venv}"
	"$python" -m venv "$venv"
	info "Installing Presidio dependencies"
	"$venv/bin/python" -m pip install --upgrade pip
	"$venv/bin/python" -m pip install -r "${presidio_dir}/requirements.txt"
}

skip_checks=0
skip_build=0
with_presidio=0
install_hook=0

while [ "$#" -gt 0 ]; do
	case "$1" in
		--skip-checks)
			skip_checks=1
			shift
			;;
		--skip-build)
			skip_build=1
			shift
			;;
		--install-git-hook)
			install_hook=1
			shift
			;;
		--with-presidio)
			with_presidio=1
			shift
			;;
		-h | --help)
			usage
			exit 0
			;;
		*)
			die "unknown argument: $1"
			;;
	esac
done

repo_root=$(resolve_repo_root)

require_cmd go
check_go_version

cd "$repo_root"

info "Downloading Go modules"
go mod download

if [ "$skip_checks" -eq 0 ]; then
	info "Running go vet"
	go vet ./...
	info "Running go test"
	go test ./...
fi

if [ "$skip_build" -eq 0 ]; then
	info "Building ./jp-pii-detect"
	go build -o jp-pii-detect ./cmd/jp-pii-detect
fi

if [ "$install_hook" -eq 1 ]; then
	install_git_hook
fi

if [ "$with_presidio" -eq 1 ]; then
	setup_presidio
fi

info "Setup complete"

'''

[cleanup]
script = '''
#!/usr/bin/env sh
set -eu

die() {
	printf '%s\n' "jp-pii-detect cleanup: $*" >&2
	exit 1
}

info() {
	printf '%s\n' "==> $*"
}

usage() {
	cat <<'USAGE'
Usage: scripts/cleanup.sh [options]

Removes local artifacts created while developing jp-pii-detector.

Default cleanup:
  ./jp-pii-detect, ./jp-pii-detect.exe, ./dist, coverage files, and profile files.

Options:
  --all          Remove all repo-local ignored artifacts handled by this script
  --fixtures     Remove local PII/postal fixture downloads
  --git-hook     Remove the pre-commit hook generated by scripts/setup.sh
  --go-cache     Run go clean -cache -testcache
  --presidio     Remove integrations/presidio/.venv and Python bytecode
  --dry-run      Print what would be removed without removing it
  -h, --help     Show this help

Environment:
  JP_PII_REPO_ROOT  Repository root override (default: git/PWD detection)
USAGE
}

resolve_repo_root() {
	for candidate in "${JP_PII_REPO_ROOT:-}" "${PWD:-}" "${OLDPWD:-}" "${GITHUB_WORKSPACE:-}"; do
		[ -n "$candidate" ] || continue
		if command -v git >/dev/null 2>&1; then
			if root=$(git -C "$candidate" rev-parse --show-toplevel 2>/dev/null); then
				printf '%s\n' "$root"
				return
			fi
		fi
		if [ -f "$candidate/go.mod" ]; then
			CDPATH= cd -- "$candidate" && pwd
			return
		fi
	done
	die "could not determine repository root; run from a checkout or set JP_PII_REPO_ROOT"
}

remove_path() {
	path=$1
	if [ ! -e "$path" ] && [ ! -L "$path" ]; then
		return
	fi
	if [ "$dry_run" -eq 1 ]; then
		printf 'would remove %s\n' "$path"
	else
		rm -rf "$path"
		printf 'removed %s\n' "$path"
	fi
}

remove_find_matches() {
	find "$@" -print | while IFS= read -r path; do
		remove_path "$path"
	done
}

remove_generated_hook() {
	if ! command -v git >/dev/null 2>&1; then
		die "git is required for --git-hook"
	fi
	hook_path=$(git -C "$repo_root" rev-parse --git-path hooks/pre-commit)
	if [ ! -e "$hook_path" ]; then
		return
	fi
	if ! grep -q 'Generated by scripts/setup.sh for jp-pii-detector' "$hook_path" 2>/dev/null; then
		die "refusing to remove non-generated hook: ${hook_path}"
	fi
	remove_path "$hook_path"
}

dry_run=0
remove_fixtures=0
remove_git_hook=0
remove_go_cache=0
remove_presidio=0

while [ "$#" -gt 0 ]; do
	case "$1" in
		--all)
			remove_fixtures=1
			remove_presidio=1
			shift
			;;
		--fixtures)
			remove_fixtures=1
			shift
			;;
		--git-hook)
			remove_git_hook=1
			shift
			;;
		--go-cache)
			remove_go_cache=1
			shift
			;;
		--presidio)
			remove_presidio=1
			shift
			;;
		--dry-run)
			dry_run=1
			shift
			;;
		-h | --help)
			usage
			exit 0
			;;
		*)
			die "unknown argument: $1"
			;;
	esac
done

repo_root=$(resolve_repo_root)

cd "$repo_root"

info "Removing build and test artifacts"
remove_path "${repo_root}/jp-pii-detect"
remove_path "${repo_root}/jp-pii-detect.exe"
remove_path "${repo_root}/dist"
remove_path "${repo_root}/coverage.out"
remove_path "${repo_root}/coverage.html"
remove_find_matches "$repo_root" -maxdepth 1 -type f \( -name '*.prof' -o -name '*.coverprofile' \)

if [ "$remove_presidio" -eq 1 ]; then
	info "Removing Presidio integration artifacts"
	remove_path "${repo_root}/integrations/presidio/.venv"
	remove_find_matches "${repo_root}/integrations/presidio" -type d -name __pycache__
	remove_find_matches "${repo_root}/integrations/presidio" -type f -name '*.pyc'
fi

if [ "$remove_fixtures" -eq 1 ]; then
	info "Removing local fixture downloads"
	remove_path "${repo_root}/pii-fixtures.json"
	remove_path "${repo_root}/utf_ken_all.zip"
	remove_path "${repo_root}/ken_all.zip"
	remove_path "${repo_root}/KEN_ALL.CSV"
fi

if [ "$remove_git_hook" -eq 1 ]; then
	info "Removing generated git hook"
	remove_generated_hook
fi

if [ "$remove_go_cache" -eq 1 ]; then
	if ! command -v go >/dev/null 2>&1; then
		die "go is required for --go-cache"
	fi
	if [ "$dry_run" -eq 1 ]; then
		printf 'would run go clean -cache -testcache\n'
	else
		info "Cleaning Go build and test cache"
		go clean -cache -testcache
	fi
fi

info "Cleanup complete"
'''
